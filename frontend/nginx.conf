server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # SPA routing — renvoie toujours index.html pour les routes Vue Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache long pour les assets hashés (JS/CSS/images avec hash dans le nom)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Pas de cache pour index.html et le manifest PWA
    location ~* \.(html|webmanifest)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache";
    }
}
